<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Anfrage - Bytes & Layers</title>
    <meta
      name="description"
      content="Produktanfrage: Menge, Kontaktdaten und optionale Anmerkungen."
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">Bytes & Layers</a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Menue"
          aria-controls="site-nav"
          aria-expanded="false"
        >
          <span class="nav-toggle-icon" aria-hidden="true"></span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Hauptnavigation">
          <a href="index.html">Start</a>
          <a href="products.html">Produkte</a>
          <a href="faq.html">FAQ</a>
          <a href="contact.html">Kontakt</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container content-narrow">
        <h1 class="page-title page-title-center">Anfrage</h1>

        <form id="request-form" class="form" novalidate>
          <div class="form-row">
            <label class="label" for="product">Produkt</label>
            <input
              class="input product-fixed"
              id="product"
              name="product"
              type="text"
              required
              readonly
              aria-readonly="true"
              placeholder="Bitte ueber eine Produktseite starten"
            />
          </div>

          <div class="form-row">
            <label class="label" for="qty">Menge</label>
            <input
              class="input"
              id="qty"
              name="qty"
              type="number"
              min="1"
              step="1"
              value="1"
              required
              inputmode="numeric"
            />
          </div>

          <div class="form-section">
            <div class="section-title-center">Kontakt</div>
            <div class="form-row">
              <label class="label" for="name">Name</label>
              <input class="input" id="name" name="name" type="text" autocomplete="name" required />
            </div>

            <div class="form-row">
              <label class="label" for="email">E-Mail</label>
              <input
                class="input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
                inputmode="email"
              />
            </div>

            <div class="form-row">
              <label class="label" for="phone">Telefon (optional)</label>
              <input
                class="input"
                id="phone"
                name="phone"
                type="tel"
                autocomplete="tel"
                inputmode="tel"
              />
            </div>
          </div>

          <div class="form-row form-row-notes">
            <label class="label" for="notes">Anmerkungen (optional)</label>
            <textarea class="input textarea" id="notes" name="notes" rows="5"></textarea>
          </div>

          <div class="cta-group form-actions">
            <button class="btn btn-primary" type="submit">Jetzt anfragen</button>
            <a class="btn" href="contact.html">Kontaktseite</a>
          </div>

          <p class="form-help" id="request-help">
            Beim Absenden wird deine Anfrage als E-Mail vorbereitet.
          </p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p>&copy; <span id="year"></span> Bytes & Layers</p>
        <nav aria-label="Rechtliches">
          <a href="legal/impressum.html">Impressum</a>
          <a href="legal/datenschutz.html">Datenschutz</a>
          <a href="legal/agb.html">AGB</a>
          <a href="legal/widerruf.html">Widerruf</a>
        </nav>
      </div>
    </footer>

    <script src="assets/main.js"></script>
  </body>
</html>
